<!DOCTYPE html> 
<html> 
<head> 
<title>Student ID System</title> 
<link rel="stylesheet" href="styles.css"> 
</head> 
<body> 
<div class="container"> 
<h2>Faculty Management Application </h2> 
<input id="name" placeholder="Name"> 
<input id="empid" placeholder="Student ID"> 
<input id="dept" placeholder="Department"> 
<input id="desig" placeholder="Cluster"> 
<input type="file" id="photo"> 
<button id="addBtn">Add Student</button> 
</div> 
<table> 
<thead> 
<tr> 
<th>Name</th> 
<th>Emp ID</th> 
<th>Dept</th> 
<th>Photo</th> 
<th>Action</th> 
</tr> 
</thead> 
<tbody id="tableBody"></tbody> 
</table> 
<script type="module" src="app.js"></script> 
</body> 
</html>
